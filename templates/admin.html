<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐉 DRAGON GOD – Админ-панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .admin-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid gold; }
        .admin-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card-admin { background: rgba(0,0,0,0.7); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid gold; }
        .stat-number { font-size: 2.5rem; font-family: 'Orbitron'; color: #ffaa33; }
        .users-table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.6); border-radius: 20px; overflow: hidden; }
        .users-table th, .users-table td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        .users-table th { background: #ffaa33; color: black; }
        .bonus-form { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 20px; margin-top: 30px; display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; }
        .bonus-form input, .bonus-form button { padding: 10px 20px; border-radius: 40px; border: none; }
        .bonus-form input { background: #222; color: gold; border: 1px solid gold; }
        .bonus-form button { background: #ffaa33; font-weight: bold; cursor: pointer; }
        .refresh-btn { background: #2ecc71; color: black; padding: 8px 20px; border-radius: 40px; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>🐉 DRAGON GOD – Админ-панель</h1>
            <button class="refresh-btn" id="refreshBtn">🔄 Обновить</button>
        </div>
        <div class="admin-stats" id="adminStats">
            <div class="stat-card-admin">👥 Всего игроков<br><span class="stat-number" id="totalUsers">0</span></div>
            <div class="stat-card-admin">💰 Общий баланс<br><span class="stat-number" id="totalBalance">0</span></div>
            <div class="stat-card-admin">🎰 Всего ставок<br><span class="stat-number" id="totalBets">0</span></div>
            <div class="stat-card-admin">🏆 Выигрыши<br><span class="stat-number" id="totalWins">0</span></div>
        </div>
        <h2>Список пользователей</h2>
        <table class="users-table" id="usersTable">
            <thead>
                <tr><th>ID</th><th>Username</th><th>Баланс</th><th>VIP</th><th>Ставок</th><th>Выигрышей</th><th>Admin</th><th>Действие</th></tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
        </table>
        <div class="bonus-form">
            <input type="text" id="bonusUsername" placeholder="Игрок">
            <input type="number" id="bonusAmount" placeholder="Сумма">
            <button id="giveBonusBtn">🎁 Выдать бонус</button>
            <button id="generateBonusCodeBtn">✨ Сгенерировать код</button>
        </div>
        <div id="generatedCode" style="margin-top: 15px; font-family: monospace; font-size: 1.2rem;"></div>
    </div>
    <script src="/static/admin.js"></script>
</body>
</html>
